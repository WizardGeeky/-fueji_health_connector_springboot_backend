#############################################
# Application
#############################################

spring.application.name=healthconnector

#############################################
# MongoDB
#############################################

spring.data.mongodb.uri=your_mongodb_url

#############################################
# File Upload
#############################################

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

#############################################
# Cache
#############################################

spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=30m

#############################################
# Mail Configuration
#############################################

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email
spring.mail.password=your_email_app_password

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

#############################################
# Spring Boot Auto-Configuration
#############################################

# Disable Vertex AI auto-configuration since credentials are not available
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.vertexai.gemini.VertexAiGeminiAutoConfiguration

#############################################
# Gemini AI Configuration
# Using Google Cloud Vertex AI
#############################################

# Google Cloud Configuration
# Set your Google Cloud Project ID
GOOGLE_CLOUD_PROJECT=test-project

# Vertex AI Gemini Model Configuration
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.5-flash-lite
spring.ai.vertex.ai.gemini.chat.options.temperature=0.2
spring.ai.vertex.ai.gemini.chat.options.max-output-tokens=4096

# Alternative: Google GenAI API Key (not used with Vertex AI)
# spring.ai.google.genai.api-key=YOUR_GENAI_API_KEY
# spring.ai.google.genai.chat.options.model=gemini-2.5-flash
# spring.ai.google.genai.chat.options.temperature=0.2
# spring.ai.google.genai.chat.options.max-output-tokens=4096

#############################################
# Server
#############################################

server.port=8080
server.servlet.context-path=/

server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain,text/xml

server.shutdown=graceful

server.error.include-message=always
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.whitelabel.enabled=false

#############################################
# JWT Configuration
# JWT secret must be at least 64 characters for HS512
#############################################

jwt.secret=your_jwt_secret
jwt.issuer=HealthConnector
jwt.audience=HealthConnectorUsers
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

#############################################
# AES Encryption
# AES key must be base64-encoded 32 bytes (256-bit)
# Generate: openssl rand -base64 32
#############################################

aes.algorithm=AES/GCM/NoPadding
aes.key-size=256
aes.secret-key=your_jwt_secret_key

#############################################
# Default Super Admin
#############################################

superadmin.email=eswar.crypto.tech@gmail.com
superadmin.password=Admin@123
superadmin.first-name=Eswararao
superadmin.last-name=Beta
superadmin.organization-name=HealthConnector Inc.

#############################################
# Application Settings
#############################################

app.security.max-failed-attempts=5
app.security.account-lock-minutes=30
app.security.password-expiry-days=90

app.encryption.enabled=true
app.audit.enabled=true

#############################################
# Notification
#############################################

app.notification.from-email=eswar.crypto.tech@gmail.com
app.notification.from-name=HealthConnector Platform
app.frontend-url=http://localhost:4200
app.password-reset.expiry-minutes=60

#############################################
# FHIR
#############################################

#app.fhir.enabled=true
#app.fhir.version=R4
#app.fhir.base-url=${FHIR_BASE_URL:https://hapi.fhir.org/baseR4}

#############################################
# CORS
#############################################

app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8080,http://localhost:49330,https://fueji-health-connector-angular-fron.vercel.app

#############################################
# Swagger / OpenAPI
#############################################

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true

#############################################
# Actuator
#############################################

#management.endpoints.web.exposure.include=health,info,metrics,prometheus
#management.endpoint.health.show-details=always
#management.metrics.export.prometheus.enabled=true

#############################################
# Resilience4j Rate Limiter
#############################################

#resilience4j.ratelimiter.instances.loginRateLimiter.limit-for-period=10
#resilience4j.ratelimiter.instances.loginRateLimiter.limit-refresh-period=60s
#resilience4j.ratelimiter.instances.loginRateLimiter.timeout-duration=0s

#############################################
# Logging (SLF4J / Logback)
#############################################

logging.level.root=INFO
logging.level.com.healthconnector=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.mongodb.driver=WARN
logging.level.org.springframework.ai=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger - %msg%n

logging.file.name=logs/healthconnector.log


#############################################
# MongoDB Logging
#############################################

logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.springframework.data.mongodb.core.ReactiveMongoTemplate=DEBUG
logging.level.org.springframework.data.mongodb.repository.query=DEBUG

logging.level.org.mongodb.driver.protocol.command=DEBUG
logging.level.org.mongodb.driver.connection=INFO
logging.level.org.mongodb.driver.cluster=INFO
logging.level.org.mongodb.driver.client=INFO
